# Internal static server for the built SPA (behind the central reverse proxy).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
