# ─────────────────────────────────────────────────────────────────────────────
#  Gunaso — Docker Compose
#  Services: postgres, redis, backend (Django/gunicorn), frontend (built SPA),
#            nginx (reverse proxy — the single entry point at http://localhost)
#  Usage:
#    cp .env.example .env   # fill in secrets first!
#    docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gunaso_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Uncomment to reach the database from the host (dev only):
    # ports:
    #   - "5432:5432"

  # ── Redis 7 — shared cache & rate-limit counters ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gunaso_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Django API (gunicorn) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/gunaso-api
      dockerfile: Dockerfile
    container_name: gunaso_backend
    environment:
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT}
      MAX_ATTACHMENT_SIZE_MB: ${MAX_ATTACHMENT_SIZE_MB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Vue 3 SPA (production build served by internal nginx) ───────────────────
  frontend:
    build:
      context: ./frontend/gunaso-ui
      dockerfile: Dockerfile
    container_name: gunaso_frontend
    expose:
      - "80"
    restart: unless-stopped

  # ── Nginx Reverse Proxy — single entry point ────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: gunaso_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/staticfiles:ro
      - media_files:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
